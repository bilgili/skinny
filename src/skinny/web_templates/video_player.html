<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; }
  canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
  #status { position: absolute; bottom: 4px; left: 8px; color: #aaa; font: 11px monospace; pointer-events: none; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="status">connecting...</div>

<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx2d = canvas.getContext('2d');
  var statusEl = document.getElementById('status');
  var SESSION_ID = '{{SESSION_ID}}';
  var W = {{WIDTH}};
  var H = {{HEIGHT}};
  var WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') +
               location.host + '/video_ws/' + SESSION_ID;

  canvas.width = W;
  canvas.height = H;

  var decoder = null;
  var useWebCodecs = ('VideoDecoder' in window);
  var ws = null;
  var frameCount = 0;
  var lastFpsTime = performance.now();
  var fpsFrames = 0;
  var displayFps = 0;
  var avccDescription = null;
  var decoderReady = false;

  function updateStatus(msg) {
    statusEl.textContent = msg;
  }

  function initDecoder(description) {
    if (!useWebCodecs) return;
    try {
      if (decoder) {
        decoder.close();
      }
      decoder = new VideoDecoder({
        output: function(frame) {
          ctx2d.drawImage(frame, 0, 0, canvas.width, canvas.height);
          frame.close();
          countFrame();
        },
        error: function(e) {
          console.error('VideoDecoder error:', e);
          useWebCodecs = false;
          decoderReady = false;
          updateStatus('decoder error, using JPEG');
        }
      });
      var config = {
        codec: 'avc1.42c01e',
        optimizeForLatency: true,
      };
      if (description) {
        config.description = description;
      }
      decoder.configure(config);
      decoderReady = true;
      console.log('VideoDecoder configured with description:', !!description);
    } catch(e) {
      console.warn('WebCodecs init failed:', e);
      useWebCodecs = false;
      decoderReady = false;
      decoder = null;
    }
  }

  function countFrame() {
    fpsFrames++;
    var now = performance.now();
    if (now - lastFpsTime > 1000) {
      displayFps = Math.round(fpsFrames * 1000 / (now - lastFpsTime));
      fpsFrames = 0;
      lastFpsTime = now;
    }
    frameCount++;
    updateStatus(displayFps + ' fps | frame ' + frameCount);
  }

  function handleJpeg(data) {
    var blob = new Blob([data], {type: 'image/jpeg'});
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      ctx2d.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      countFrame();
    };
    img.src = url;
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      updateStatus('connected');
    };

    ws.onmessage = function(event) {
      var data = new Uint8Array(event.data);
      if (data.length < 5) return;

      var type = data[0];  // 0=H264 key, 1=H264 delta, 2=JPEG, 3=codec config
      var payload = data.slice(5);

      if (type === 3) {
        // AVCC description — configure decoder
        avccDescription = payload.buffer.slice(
          payload.byteOffset, payload.byteOffset + payload.byteLength
        );
        initDecoder(avccDescription);
        return;
      }

      if ((type === 0 || type === 1) && decoderReady && decoder) {
        try {
          var chunk = new EncodedVideoChunk({
            type: type === 0 ? 'key' : 'delta',
            timestamp: frameCount * (1000000 / 20),
            data: payload,
          });
          decoder.decode(chunk);
        } catch(e) {
          console.error('H264 decode error:', e);
          useWebCodecs = false;
          decoderReady = false;
        }
      } else if (type === 2) {
        handleJpeg(payload);
      }
    };

    ws.onclose = function() {
      updateStatus('disconnected — reconnecting...');
      decoderReady = false;
      setTimeout(connect, 2000);
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  // --- Camera controls ---
  var dragging = false;
  var dragButton = -1;
  var lastX = 0, lastY = 0;

  function sendCamera(action, params) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      params.type = 'camera';
      params.action = action;
      ws.send(JSON.stringify(params));
    }
  }

  canvas.addEventListener('mousedown', function(e) {
    dragging = true;
    dragButton = e.button;
    lastX = e.clientX;
    lastY = e.clientY;
    e.preventDefault();
  });

  canvas.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.clientX - lastX;
    var dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    if (dragButton === 0) {
      sendCamera('orbit', {dx: dx, dy: dy});
    } else if (dragButton === 2) {
      sendCamera('pan', {dx: dx, dy: dy});
    }
  });

  window.addEventListener('mouseup', function(e) {
    dragging = false;
    dragButton = -1;
  });

  canvas.addEventListener('wheel', function(e) {
    sendCamera('zoom', {delta: e.deltaY > 0 ? -1 : 1});
    e.preventDefault();
  }, {passive: false});

  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // --- Keyboard for free camera ---
  var keysDown = {};
  canvas.tabIndex = 0;
  canvas.addEventListener('keydown', function(e) { keysDown[e.key.toLowerCase()] = true; });
  canvas.addEventListener('keyup', function(e) { keysDown[e.key.toLowerCase()] = false; });

  function pollKeys() {
    var f = (keysDown['w'] ? 1 : 0) - (keysDown['s'] ? 1 : 0);
    var r = (keysDown['d'] ? 1 : 0) - (keysDown['a'] ? 1 : 0);
    var u = (keysDown['e'] ? 1 : 0) - (keysDown['q'] ? 1 : 0);
    if (f || r || u) {
      sendCamera('move', {forward: f, right: r, up: u, dt: 0.016});
    }
    requestAnimationFrame(pollKeys);
  }
  requestAnimationFrame(pollKeys);

  connect();
})();
</script>
</body>
</html>
