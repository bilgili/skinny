<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: #111; overflow: hidden; }
  #wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  /* Canvas keeps its intrinsic aspect ratio inside the wrapper. */
  canvas {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    display: block; cursor: crosshair;
    object-fit: contain;
  }
  #status { position: absolute; bottom: 4px; left: 8px; color: #aaa; font: 11px monospace; pointer-events: none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="canvas"></canvas>
</div>
<div id="status">connecting...</div>

<script>
(function() {
  var canvas = document.getElementById('canvas');
  var ctx2d = canvas.getContext('2d');
  var statusEl = document.getElementById('status');
  var SESSION_ID = '{{SESSION_ID}}';
  var W = {{WIDTH}};
  var H = {{HEIGHT}};
  var WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') +
               location.host + '/video_ws/' + SESSION_ID;

  function applyCanvasSize(w, h) {
    W = w; H = h;
    // Set the bitmap size; CSS object-fit keeps aspect ratio inside wrap.
    canvas.width = w;
    canvas.height = h;
    // Hint browser of intrinsic ratio so the layout box matches before
    // any pixels arrive (esp. on Safari without object-fit support).
    canvas.style.aspectRatio = w + ' / ' + h;
  }
  applyCanvasSize(W, H);

  var decoder = null;
  var useWebCodecs = ('VideoDecoder' in window);
  var ws = null;
  var frameCount = 0;
  var lastFpsTime = performance.now();
  var fpsFrames = 0;
  var displayFps = 0;
  var avccDescription = null;
  var decoderReady = false;

  function updateStatus(msg) {
    statusEl.textContent = msg;
  }

  function initDecoder(description) {
    if (!useWebCodecs) return;
    try {
      if (decoder) {
        try { decoder.close(); } catch (e) { /* already closed */ }
      }
      decoder = new VideoDecoder({
        output: function(frame) {
          ctx2d.drawImage(frame, 0, 0, canvas.width, canvas.height);
          frame.close();
          countFrame();
        },
        error: function(e) {
          console.error('VideoDecoder error:', e);
          useWebCodecs = false;
          decoderReady = false;
          updateStatus('decoder error, using JPEG');
        }
      });
      // Derive codec string from AVCC description (bytes 1=profile,
      // 2=profile_compat, 3=level). Hardcoding 'avc1.42c01e' (baseline
      // L3.0) breaks for resolutions above 720p — the configure call
      // silently fails and the canvas stays black.
      var codecStr = 'avc1.42c01e';
      if (description) {
        var b = new Uint8Array(description);
        if (b.length >= 4) {
          var hex = function(v) { return v.toString(16).padStart(2, '0'); };
          codecStr = 'avc1.' + hex(b[1]) + hex(b[2]) + hex(b[3]);
        }
      }
      var config = {
        codec: codecStr,
        optimizeForLatency: true,
      };
      if (description) {
        config.description = description;
      }
      console.log('VideoDecoder.configure codec=' + codecStr);
      decoder.configure(config);
      decoderReady = true;
      console.log('VideoDecoder configured with description:', !!description);
    } catch(e) {
      console.warn('WebCodecs init failed:', e);
      useWebCodecs = false;
      decoderReady = false;
      decoder = null;
    }
  }

  function countFrame() {
    fpsFrames++;
    var now = performance.now();
    if (now - lastFpsTime > 1000) {
      displayFps = Math.round(fpsFrames * 1000 / (now - lastFpsTime));
      fpsFrames = 0;
      lastFpsTime = now;
    }
    frameCount++;
    updateStatus(displayFps + ' fps | frame ' + frameCount + ' | ' + W + 'x' + H);
  }

  function handleJpeg(data) {
    var blob = new Blob([data], {type: 'image/jpeg'});
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      ctx2d.drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      countFrame();
    };
    img.src = url;
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      updateStatus('connected');
    };

    ws.onmessage = function(event) {
      var data = new Uint8Array(event.data);
      if (data.length < 5) return;

      // Header: 1 byte type + 4 bytes uint (accum/placeholder).
      var type = data[0];  // 0=H264 key, 1=H264 delta, 2=JPEG, 3=codec, 4=resize
      var payload = data.slice(5);

      if (type === 3) {
        avccDescription = payload.buffer.slice(
          payload.byteOffset, payload.byteOffset + payload.byteLength
        );
        initDecoder(avccDescription);
        return;
      }

      if (type === 4) {
        // Resize message: payload = uint16 width, uint16 height (big-endian).
        if (payload.length < 4) return;
        var w = (payload[0] << 8) | payload[1];
        var h = (payload[2] << 8) | payload[3];
        applyCanvasSize(w, h);
        // Drop the existing decoder; the next type=3 message will rebuild it.
        if (decoder) {
          try { decoder.close(); } catch (e) { /* nothing */ }
          decoder = null;
        }
        decoderReady = false;
        return;
      }

      if ((type === 0 || type === 1) && decoderReady && decoder) {
        try {
          var chunk = new EncodedVideoChunk({
            type: type === 0 ? 'key' : 'delta',
            timestamp: frameCount * (1000000 / 20),
            data: payload,
          });
          decoder.decode(chunk);
        } catch(e) {
          console.error('H264 decode error:', e);
          useWebCodecs = false;
          decoderReady = false;
        }
      } else if (type === 2) {
        handleJpeg(payload);
      }
    };

    ws.onclose = function() {
      updateStatus('disconnected — reconnecting...');
      decoderReady = false;
      setTimeout(connect, 2000);
    };

    ws.onerror = function() {
      ws.close();
    };
  }

  // --- Camera controls ---
  var dragging = false;
  var dragButton = -1;
  var lastX = 0, lastY = 0;

  function sendCamera(action, params) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      params.type = 'camera';
      params.action = action;
      ws.send(JSON.stringify(params));
    }
  }

  canvas.addEventListener('mousedown', function(e) {
    dragging = true;
    dragButton = e.button;
    lastX = e.clientX;
    lastY = e.clientY;
    e.preventDefault();
  });

  canvas.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.clientX - lastX;
    var dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    if (dragButton === 0) {
      sendCamera('orbit', {dx: dx, dy: dy});
    } else if (dragButton === 2) {
      sendCamera('pan', {dx: dx, dy: dy});
    }
  });

  window.addEventListener('mouseup', function(e) {
    dragging = false;
    dragButton = -1;
  });

  canvas.addEventListener('wheel', function(e) {
    sendCamera('zoom', {delta: e.deltaY > 0 ? -1 : 1});
    e.preventDefault();
  }, {passive: false});

  canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // --- Keyboard for free camera ---
  var keysDown = {};
  canvas.tabIndex = 0;
  canvas.addEventListener('keydown', function(e) { keysDown[e.key.toLowerCase()] = true; });
  canvas.addEventListener('keyup', function(e) { keysDown[e.key.toLowerCase()] = false; });

  function pollKeys() {
    var f = (keysDown['w'] ? 1 : 0) - (keysDown['s'] ? 1 : 0);
    var r = (keysDown['d'] ? 1 : 0) - (keysDown['a'] ? 1 : 0);
    var u = (keysDown['e'] ? 1 : 0) - (keysDown['q'] ? 1 : 0);
    if (f || r || u) {
      sendCamera('move', {forward: f, right: r, up: u, dt: 0.016});
    }
    requestAnimationFrame(pollKeys);
  }
  requestAnimationFrame(pollKeys);

  connect();
})();
</script>
</body>
</html>
