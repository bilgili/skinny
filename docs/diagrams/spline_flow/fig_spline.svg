<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <style>
      .hdr{font-size:14px;font-weight:700;fill:#0f172a;}
      .ax{font-size:11px;fill:#475569;}
      .note{font-size:10.5px;fill:#64748b;}
      .gl{font-size:12px;font-weight:600;fill:#7c3aed;}
      .knot{font-size:11px;font-weight:600;fill:#0f172a;}
    </style>
  </defs>

  <text x="20" y="28" class="hdr">A monotone rational-quadratic spline: K bins on [−B, B], linear identity tails outside</text>

  <!-- plot frame -->
  <rect x="80" y="40" width="600" height="320" fill="#ffffff" stroke="#e2e8f0"/>

  <!-- bin boundary verticals (knots in x) -->
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3">
    <line x1="165.7" y1="40" x2="165.7" y2="360"/>
    <line x1="251.4" y1="40" x2="251.4" y2="360"/>
    <line x1="337.1" y1="40" x2="337.1" y2="360"/>
    <line x1="422.9" y1="40" x2="422.9" y2="360"/>
    <line x1="508.6" y1="40" x2="508.6" y2="360"/>
    <line x1="594.3" y1="40" x2="594.3" y2="360"/>
  </g>

  <!-- axes -->
  <line x1="80" y1="200" x2="680" y2="200" stroke="#94a3b8" stroke-width="1.4"/>
  <line x1="380" y1="40" x2="380" y2="360" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="668" y="216" class="ax">input x</text>
  <text x="388" y="52" class="ax">output y</text>

  <!-- B markers -->
  <line x1="165.7" y1="196" x2="165.7" y2="204" stroke="#475569" stroke-width="1.6"/>
  <text x="165.7" y="222" text-anchor="middle" class="ax">−B</text>
  <line x1="594.3" y1="196" x2="594.3" y2="204" stroke="#475569" stroke-width="1.6"/>
  <text x="594.3" y="222" text-anchor="middle" class="ax">+B</text>

  <!-- identity reference -->
  <line x1="80" y1="360" x2="680" y2="40" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="120" y="350" class="note">identity y = x</text>

  <!-- linear identity tails (on top of the curve range, emphasised) -->
  <line x1="80" y1="360" x2="165.7" y2="314.3" stroke="#a78bfa" stroke-width="2.4"/>
  <line x1="594.3" y1="85.7" x2="680" y2="40" stroke="#a78bfa" stroke-width="2.4"/>
  <text x="92" y="300" class="note">linear tail</text>
  <text x="612" y="78" class="note">linear tail</text>

  <!-- the monotone spline curve inside [-B,B] -->
  <path d="M165.7,314.3
           C200,305 225,300 251.4,297.1
           C290,290 305,278 337.1,262.9
           C380,245 395,205 422.9,171.4
           C460,140 485,128 508.6,120.0
           C545,105 575,93 594.3,85.7"
        fill="none" stroke="#7c3aed" stroke-width="2.6"/>

  <!-- knots -->
  <g fill="#7c3aed" stroke="#ffffff" stroke-width="1.2">
    <circle cx="165.7" cy="314.3" r="4.5"/>
    <circle cx="251.4" cy="297.1" r="4.5"/>
    <circle cx="337.1" cy="262.9" r="4.5"/>
    <circle cx="422.9" cy="171.4" r="4.5"/>
    <circle cx="508.6" cy="120.0" r="4.5"/>
    <circle cx="594.3" cy="85.7" r="4.5"/>
  </g>
  <text x="430" y="392" text-anchor="middle" class="gl">K = 5 bins · 6 knots · monotone increasing</text>

  <!-- width brace for bin between x knots 4 and 5 -->
  <line x1="422.9" y1="372" x2="508.6" y2="372" stroke="#475569" stroke-width="1.2"/>
  <line x1="422.9" y1="368" x2="422.9" y2="376" stroke="#475569" stroke-width="1.2"/>
  <line x1="508.6" y1="368" x2="508.6" y2="376" stroke="#475569" stroke-width="1.2"/>
  <text x="465.7" y="388" text-anchor="middle" class="ax">w_k</text>

  <!-- height brace for that bin -->
  <line x1="528" y1="171.4" x2="528" y2="120.0" stroke="#475569" stroke-width="1.2"/>
  <line x1="524" y1="171.4" x2="532" y2="171.4" stroke="#475569" stroke-width="1.2"/>
  <line x1="524" y1="120.0" x2="532" y2="120.0" stroke="#475569" stroke-width="1.2"/>
  <text x="538" y="149" class="ax">h_k</text>

  <!-- derivative (tangent) at a knot -->
  <line x1="395" y1="196" x2="451" y2="147" stroke="#f59e0b" stroke-width="2"/>
  <text x="455" y="150" class="ax" fill="#b45309">slope δ_k ≥ 0</text>

  <!-- caption -->
  <text x="80" y="416" class="note">Bin widths/heights are softmax-normalised (sum to 2B); knot derivatives are softplus (positive) ⇒ the map is a valid monotone bijection, invertible by solving one quadratic.</text>
</svg>
