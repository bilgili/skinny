<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .lbl{font-size:13px;font-weight:600;fill:#0f172a;}
      .sub{font-size:11px;fill:#475569;}
      .note{font-size:10.5px;fill:#64748b;}
      .hdr{font-size:14px;font-weight:700;fill:#0f172a;}
      .gl{font-size:11px;font-weight:600;fill:#7c3aed;}
    </style>
  </defs>

  <text x="20" y="26" class="hdr">SplineFlow path guiding — a learned hemisphere lobe steers the bounce toward incident radiance</text>

  <!-- surface -->
  <line x1="60" y1="320" x2="800" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <text x="60" y="340" class="note">shading surface (flat / python material)</text>
  <!-- hatching under surface -->
  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="70" y1="320" x2="56" y2="334"/><line x1="110" y1="320" x2="96" y2="334"/>
    <line x1="150" y1="320" x2="136" y2="334"/><line x1="190" y1="320" x2="176" y2="334"/>
    <line x1="230" y1="320" x2="216" y2="334"/>
  </g>

  <!-- shading point x -->
  <circle cx="300" cy="320" r="5" fill="#0f172a"/>
  <text x="300" y="356" text-anchor="middle" class="lbl">x</text>

  <!-- normal N -->
  <line x1="300" y1="320" x2="300" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#arr)" stroke-dasharray="5 3"/>
  <text x="312" y="160" class="sub">N (shading normal)</text>

  <!-- incoming view / wo toward previous vertex -->
  <line x1="160" y1="180" x2="300" y2="320" stroke="#3b82f6" stroke-width="1.8"/>
  <line x1="300" y1="320" x2="178" y2="198" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="120" y="176" class="sub" fill="#3b82f6">ω_o (toward prev vertex)</text>

  <!-- BSDF lobe (grey, broad) -->
  <path d="M300,320 C250,210 350,210 300,320 Z" fill="none"/>
  <path d="M210,300 C235,235 300,205 365,235 C420,260 415,300 415,300" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="408" y="296" class="note">BSDF lobe p_bsdf (broad)</text>

  <!-- guided lobe (purple, concentrated toward the light) -->
  <path d="M300,320 C300,250 380,212 470,196 C400,210 350,250 360,300 C362,312 345,318 330,318 Z"
        fill="#faf5ff" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="430" y="250" class="gl">q_ω learned lobe</text>
  <text x="430" y="266" class="note">(conditioned on x, N, ω_o)</text>

  <!-- guided sample direction wi -->
  <line x1="300" y1="320" x2="560" y2="150" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#arrG)"/>
  <text x="470" y="140" class="gl">ω ~ q_ω  (guided bounce)</text>

  <!-- a few BSDF candidate rays (wasted, miss the light) -->
  <line x1="300" y1="320" x2="180" y2="150" stroke="#cbd5e1" stroke-width="1.3" marker-end="url(#arrB)"/>
  <line x1="300" y1="320" x2="250" y2="120" stroke="#cbd5e1" stroke-width="1.3" marker-end="url(#arrB)"/>
  <text x="150" y="118" class="note">BSDF draws often miss</text>

  <!-- the light / bright incident radiance -->
  <circle cx="600" cy="120" r="26" fill="#fde68a" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="600" y="124" text-anchor="middle" class="sub" fill="#92400e">L_i</text>
  <g stroke="#f59e0b" stroke-width="1.4">
    <line x1="600" y1="86" x2="600" y2="74"/><line x1="634" y1="120" x2="646" y2="120"/>
    <line x1="624" y1="96" x2="633" y2="87"/><line x1="624" y1="144" x2="633" y2="153"/>
  </g>
  <text x="560" y="176" class="note">incident radiance the flow learns to chase: q ∝ f · L_i · cos</text>

  <!-- condition box -->
  <rect x="40" y="372" width="780" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="52" y="390" class="sub" fill="#1e40af">condition c = (position normalised to scene AABB → [−1,1]³, shading normal N, outgoing dir ω_o) ∈ ℝ⁹</text>
  <text x="52" y="408" class="note">the flow maps a uniform base sample u ∈ [0,1]² to ω with an exact solid-angle pdf q_ω — mixed unbiased with the BSDF/env proposals</text>
</svg>
