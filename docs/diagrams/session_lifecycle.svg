<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5">
  <defs>
    <marker id="arr4" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    .b{fill:#f4f6fb;stroke:#5b7cc4;stroke-width:1.3;}
    .c{fill:#eef7ee;stroke:#4a9a4a;stroke-width:1.3;}
    .x{fill:#fbeeee;stroke:#c45b5b;stroke-width:1.3;}
    .t{fill:#1a2230;}
    .f{fill:#7a8aa0;font-size:10.5px;}
    .e{stroke:#555;stroke-width:1.2;fill:none;marker-end:url(#arr4);}
  </style>

  <!-- connect -->
  <rect class="b" x="20" y="30" width="200" height="44" rx="8"/>
  <text class="t" x="120" y="50" text-anchor="middle">Browser connects</text>
  <text class="f" x="120" y="66" text-anchor="middle">Panel creates session</text>

  <rect class="c" x="270" y="14" width="280" height="120" rx="8"/>
  <text class="t" x="410" y="36" text-anchor="middle" font-weight="600">SkinnySession.__init__()</text>
  <text class="f" x="410" y="58" text-anchor="middle">VulkanContext(window=None)  headless</text>
  <text class="f" x="410" y="76" text-anchor="middle">Renderer(vk_ctx, …, usd_scene)</text>
  <text class="f" x="410" y="94" text-anchor="middle">VideoEncoder(w, h, gpu_info)</text>
  <text class="f" x="410" y="112" text-anchor="middle">Thread(_render_loop)  starts</text>

  <!-- disconnect -->
  <rect class="b" x="20" y="200" width="200" height="44" rx="8"/>
  <text class="t" x="120" y="220" text-anchor="middle">Browser disconnects</text>
  <text class="f" x="120" y="236" text-anchor="middle">on_session_destroyed</text>

  <rect class="x" x="270" y="178" width="280" height="100" rx="8"/>
  <text class="t" x="410" y="200" text-anchor="middle" font-weight="600">session.cleanup()</text>
  <text class="f" x="410" y="222" text-anchor="middle">_running = False → thread joins</text>
  <text class="f" x="410" y="240" text-anchor="middle">encoder.close() · renderer.cleanup()</text>
  <text class="f" x="410" y="258" text-anchor="middle">ctx.destroy()</text>

  <text class="f" x="650" y="74" text-anchor="middle">max sessions</text>
  <text class="f" x="650" y="90" text-anchor="middle">capped (default 4)</text>

  <path class="e" d="M220,52 L268,62"/>
  <path class="e" d="M220,222 L268,222"/>
</svg>
