  <text class="f" x="380" y="254" text-anchor="middle">walks slangpile + MaterialX graphs</text>

  <rect class="g" x="220" y="288" width="320" height="48" rx="8"/>
  <text class="t" x="380" y="309" text-anchor="middle">Slang → SPIR-V  ·  Pipeline rebuild</text>
  <text class="f" x="380" y="326" text-anchor="middle">mtime-LRU cache · skipped if graph set identical</text>

  <path class="e" d="M220,44 L278,44"/>
  <path class="e" d="M500,44 L558,44"/>
  <path class="e" d="M650,74 L470,118"/>
  <path class="e" d="M390,168 L380,214"/>
  <path class="e" d="M380,264 L380,286"/>
