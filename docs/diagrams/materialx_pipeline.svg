<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5">
  <defs>
    <marker id="arr3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#555"/>
    </marker>
  </defs>
  <style>
    .b{fill:#f4f6fb;stroke:#5b7cc4;stroke-width:1.3;}
    .g{fill:#eef7ee;stroke:#4a9a4a;stroke-width:1.3;}
    .t{fill:#1a2230;}
    .f{fill:#7a8aa0;font-size:10.5px;font-style:italic;}
    .e{stroke:#555;stroke-width:1.2;fill:none;marker-end:url(#arr3);}
  </style>

  <rect class="b" x="20" y="20" width="200" height="48" rx="8"/>
  <text class="t" x="120" y="41" text-anchor="middle" font-weight="600">USD scene + MaterialX</text>
  <text class="f" x="120" y="58" text-anchor="middle">usd_loader.py</text>

  <rect class="b" x="280" y="20" width="220" height="48" rx="8"/>
  <text class="t" x="390" y="41" text-anchor="middle">CompiledMaterial</text>
  <text class="f" x="390" y="58" text-anchor="middle">per UsdShade.Material</text>

  <rect class="g" x="560" y="14" width="180" height="60" rx="8"/>
  <text class="t" x="650" y="35" text-anchor="middle">MaterialXGenSlang</text>
  <text class="f" x="650" y="52" text-anchor="middle">graph_&lt;hash&gt;.slang →</text>
  <text class="f" x="650" y="67" text-anchor="middle">shaders/generated/</text>

